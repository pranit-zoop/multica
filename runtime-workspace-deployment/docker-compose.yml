services:
  claude-mymotor:
    build:
      context: .
      args:
        TARGETARCH: arm64
    container_name: multica-claude-mymotor
    environment:
      - MULTICA_SERVER_URL=https://zap-multica.zoop.tools
      - MULTICA_APP_URL=https://zap-multica.zoop.tools
      - MULTICA_TOKEN=${MYMOTOR_MULTICA_TOKEN}
      - MULTICA_WORKSPACE_ID=${MYMOTOR_WORKSPACE_ID}
      - MULTICA_DAEMON_DEVICE_NAME=docker-mymotor
    dns:
      - 8.8.8.8
      - 8.8.4.4
    volumes:
      - claude-auth-mymotor:/home/agent/.claude
      - codex-auth-mymotor:/home/agent/.codex
      - opencode-config-mymotor:/home/agent/.config/opencode
      - opencode-data-mymotor:/home/agent/.local/share/opencode
      - multica-state-mymotor:/home/agent/.multica
      - mymotor-workspaces:/home/agent/multica_workspaces
    restart: unless-stopped

volumes:
  claude-auth-mymotor:
  codex-auth-mymotor:
  opencode-config-mymotor:
  opencode-data-mymotor:
  multica-state-mymotor:
  mymotor-workspaces:
